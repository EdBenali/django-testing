{% extends "base.html" %}

{% block title %}{{ post.title }} · Blog · Django Learning{% endblock %}

{% block content %}
  <p><a href="{% url 'blog:post_list' %}">&larr; Back to blog</a></p>

  <article>
    <h1>{{ post.title }}</h1>
    <time datetime="{{ post.published_at|date:'c' }}">
      {{ post.published_at|date:"F j, Y, g:i a" }}
    </time>
    <div>{{ post.text|linebreaks }}</div>
  </article>
{% endblock %}
